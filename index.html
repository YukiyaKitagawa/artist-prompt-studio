<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Artist Prompt Studio</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-light: #1f2937;
      --text: #f9fafb;
      --muted: #9ca3af;
      --accent: #38bdf8;
      --accent2: #a78bfa;
      --border: #334155;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.18), transparent 32%),
        radial-gradient(circle at bottom right, rgba(167, 139, 250, 0.18), transparent 32%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      padding: 34px 20px 18px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 46px);
      letter-spacing: 0.04em;
    }

    header p {
      margin: 12px auto 0;
      color: var(--muted);
      max-width: 900px;
      line-height: 1.7;
    }

    .top-links {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .top-links a {
      color: #020617;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      text-decoration: none;
      border-radius: 999px;
      padding: 9px 15px;
      font-weight: 800;
      font-size: 14px;
    }

    main {
      width: min(1280px, calc(100% - 32px));
      margin: 24px auto 48px;
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 20px;
    }

    .card {
      background: rgba(17, 24, 39, 0.88);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
    }

    h2, h3 {
      margin-top: 0;
    }

    label {
      display: block;
      font-weight: 700;
      margin: 16px 0 8px;
      color: #e5e7eb;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel-light);
      color: var(--text);
      padding: 11px 13px;
      font-size: 14px;
      outline: none;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.7;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.18);
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      margin-top: 6px;
    }

    .section-block {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }

    .grid {
      display: grid;
      gap: 10px;
    }

    .persona-button,
    .character-button {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(31, 41, 55, 0.72);
      color: var(--text);
      padding: 13px;
      cursor: pointer;
      text-align: left;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      transition: 0.18s ease;
    }

    .persona-button:hover,
    .character-button:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .persona-button.selected,
    .character-button.selected {
      border-color: var(--accent);
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.2), rgba(167, 139, 250, 0.18));
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.12);
    }

    .persona-button strong,
    .character-button strong {
      display: block;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .persona-button .meta,
    .character-button .meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .character-thumb {
      width: 68px;
      height: 68px;
      border-radius: 14px;
      object-fit: cover;
      background: #020617;
      border: 1px solid var(--border);
      flex: 0 0 auto;
    }

    .character-placeholder {
      width: 68px;
      height: 68px;
      border-radius: 14px;
      background: #020617;
      border: 1px solid var(--border);
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 11px;
    }

    .selected-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .selected-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--border);
      background: rgba(31, 41, 55, 0.9);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 13px;
      color: #e5e7eb;
    }

    .selected-chip button {
      border: none;
      background: rgba(239, 68, 68, 0.18);
      color: #fecaca;
      border-radius: 999px;
      cursor: pointer;
      padding: 2px 7px;
      font-size: 12px;
      font-weight: 800;
    }

    .count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 22px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.18);
      color: #bae6fd;
      font-size: 12px;
      font-weight: 800;
      margin-left: 6px;
      padding: 0 8px;
    }

    .option-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }

    .check-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
      background: rgba(31, 41, 55, 0.58);
      display: flex;
      gap: 8px;
      align-items: flex-start;
      color: #e5e7eb;
      font-size: 13px;
      line-height: 1.5;
      cursor: pointer;
    }

    .check-card input {
      width: auto;
      margin-top: 3px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.18s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #020617;
    }

    .secondary {
      background: #334155;
      color: var(--text);
    }

    .danger {
      background: var(--danger);
      color: #fff;
    }

    .small {
      padding: 7px 11px;
      font-size: 13px;
    }

    .status {
      margin-top: 14px;
      min-height: 24px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .status.success {
      color: var(--success);
    }

    .status.error {
      color: var(--danger);
    }

    .status.warning {
      color: var(--warning);
    }

    .result-box {
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.82);
      border-radius: 16px;
      padding: 16px;
      margin-top: 14px;
    }

    .result-box h3 {
      margin: 0 0 10px;
      font-size: 17px;
    }

    .result-content {
      white-space: pre-wrap;
      line-height: 1.75;
      color: #e5e7eb;
      font-size: 14px;
      min-height: 120px;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 1100px) {
      main {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 680px) {
      .option-grid {
        grid-template-columns: 1fr;
      }

      main {
        width: min(100% - 20px, 1280px);
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Artist Prompt Studio</h1>
    <p>
      最大2名の絵師ペルソナとキャラクター設定を組み合わせ、共創パターンを指定して画像生成プロンプトを作成します。
    </p>

    <div class="top-links">
      <a href="./admin.html">管理画面を開く</a>
    </div>
  </header>

  <main>
    <section class="card">
      <h2>入力</h2>

      <label for="modelName">使用モデル</label>
      <select id="modelName">
        <option value="gemini-2.5-flash">gemini-2.5-flash</option>
        <option value="gemini-2.5-pro">gemini-2.5-pro</option>
        <option value="gemini-1.5-flash">gemini-1.5-flash</option>
      </select>

      <div class="section-block">
        <h3>絵師ペルソナ選択</h3>
        <p class="hint">
          最大2名まで選択できます。2名選択時は共創パターンを指定できます。
        </p>

        <div id="personaGrid" class="grid"></div>

        <div class="selected-summary" id="selectedPersonaSummary"></div>

        <label for="collabPattern">共創パターン</label>
        <select id="collabPattern" disabled>
          <option value="auto">おまかせ統合</option>
          <option value="character_a_background_b">キャラ絵師A + 背景絵師B</option>
          <option value="background_a_character_b">背景絵師A + キャラ絵師B</option>
          <option value="left_a_right_b">左側A + 右側B</option>
          <option value="top_a_bottom_b">上側A + 下側B</option>
          <option value="foreground_a_background_b">前景A + 背景B</option>
          <option value="main_a_effect_b">主役A + 演出B</option>
        </select>
      </div>

      <div class="section-block">
        <h3>キャラクター選択</h3>

        <label for="categorySelect">
          カテゴリ
          <span class="count-badge" id="categoryCountBadge">0</span>
        </label>
        <select id="categorySelect"></select>
        <p class="hint">
          カテゴリを切り替えても、選択済みキャラクターは保持されます。
        </p>

        <div class="actions">
          <button class="secondary small" id="clearCharactersBtn">選択中キャラクターを全解除</button>
        </div>

        <div class="selected-summary" id="selectedCharacterSummary"></div>

        <div id="characterGrid" class="grid" style="margin-top: 14px;"></div>
      </div>

      <div class="section-block">
        <h3>無し設定</h3>
        <p class="hint">
          必要なものだけ選択してください。選択した項目のみプロンプトに反映します。
        </p>

        <div class="option-grid">
          <label class="check-card">
            <input type="checkbox" class="none-option" value="no_text" />
            <span>文字なし / no text</span>
          </label>

          <label class="check-card">
            <input type="checkbox" class="none-option" value="no_captions" />
            <span>キャプションなし / no captions</span>
          </label>

          <label class="check-card">
            <input type="checkbox" class="none-option" value="no_logos" />
            <span>ロゴなし / no logos</span>
          </label>

          <label class="check-card">
            <input type="checkbox" class="none-option" value="no_readable_letters" />
            <span>読める文字なし / no readable letters</span>
          </label>

          <label class="check-card">
            <input type="checkbox" class="none-option" value="no_text_except_title" />
            <span>タイトル以外の文字なし</span>
          </label>
        </div>
      </div>

      <div class="section-block">
        <h3>シーン指示</h3>

        <label for="sceneText">作りたい画像の内容</label>
        <textarea id="sceneText" placeholder="例：ナガノAIとナガノ玄が、未来的なオフィスでプレゼン資料を作成している。アスペクト比16:9。"></textarea>

        <label for="extraText">追加条件</label>
        <textarea id="extraText" placeholder="例：ネオンブルー、ピンク、紫の発光表現。タイトル以外の文字表記なし。"></textarea>

        <div class="actions">
          <button class="primary" id="generateBtn">プロンプト生成</button>
          <button class="secondary" id="clearInputBtn">入力をクリア</button>
        </div>

        <div class="status" id="status"></div>
      </div>
    </section>

    <section class="card">
      <h2>生成結果</h2>

      <div class="result-box">
        <h3>English Prompt</h3>
        <div class="result-content" id="englishPrompt"></div>
        <div class="actions">
          <button class="secondary small" id="copyEnglishBtn">English Promptをコピー</button>
        </div>
      </div>

      <div class="result-box">
        <h3>日本語プロンプト</h3>
        <div class="result-content" id="japanesePrompt"></div>
        <div class="actions">
          <button class="secondary small" id="copyJapaneseBtn">日本語プロンプトをコピー</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const SUPABASE_URL = "https://jkacguhaabaqtrjaahgl.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImprYWNndWhhYWJhcXRyamFhaGdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNTIxNjAsImV4cCI6MjA5NzcyODE2MH0.6BnIs9aq4pM9DKicbdiEBG95fvw4Oyihd4YW4_Q1U4c";

    const FUNCTION_URL =
      "https://jkacguhaabaqtrjaahgl.supabase.co/functions/v1/artist-generate-prompt";

    const CHARACTER_IMAGE_SIGN_URL_FUNCTION =
      "https://jkacguhaabaqtrjaahgl.supabase.co/functions/v1/artist-character-image-url";

    const MAX_PERSONA_SELECTION = 2;

    const NONE_OPTION_LABELS = {
      no_text: "no text / 文字なし",
      no_captions: "no captions / キャプションなし",
      no_logos: "no logos / ロゴなし",
      no_readable_letters: "no readable letters / 読める文字なし",
      no_text_except_title:
        "only the specified title text is allowed, no other text / タイトル以外の文字なし",
    };

    const COLLAB_PATTERN_LABELS = {
      auto: "おまかせ統合",
      character_a_background_b: "キャラ絵師A + 背景絵師B",
      background_a_character_b: "背景絵師A + キャラ絵師B",
      left_a_right_b: "左側A + 右側B",
      top_a_bottom_b: "上側A + 下側B",
      foreground_a_background_b: "前景A + 背景B",
      main_a_effect_b: "主役A + 演出B",
    };

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let personas = [];
    let categories = [];
    let characters = [];

    let selectedPersonas = [];
    let selectedCharacters = [];

    const modelName = document.getElementById("modelName");
    const personaGrid = document.getElementById("personaGrid");
    const selectedPersonaSummary = document.getElementById("selectedPersonaSummary");
    const collabPattern = document.getElementById("collabPattern");

    const categorySelect = document.getElementById("categorySelect");
    const categoryCountBadge = document.getElementById("categoryCountBadge");
    const characterGrid = document.getElementById("characterGrid");
    const selectedCharacterSummary = document.getElementById("selectedCharacterSummary");
    const clearCharactersBtn = document.getElementById("clearCharactersBtn");

    const sceneText = document.getElementById("sceneText");
    const extraText = document.getElementById("extraText");

    const generateBtn = document.getElementById("generateBtn");
    const clearInputBtn = document.getElementById("clearInputBtn");

    const statusEl = document.getElementById("status");
    const englishPrompt = document.getElementById("englishPrompt");
    const japanesePrompt = document.getElementById("japanesePrompt");

    const copyEnglishBtn = document.getElementById("copyEnglishBtn");
    const copyJapaneseBtn = document.getElementById("copyJapaneseBtn");

    function setStatus(message, type = "") {
      statusEl.textContent = message;
      statusEl.className = `status ${type}`;
    }

    function escapeHtml(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getShortText(text, max = 110) {
      const value = String(text || "");
      return value.slice(0, max) + (value.length > max ? "..." : "");
    }

    async function getSignedImageUrl(imagePath) {
      if (!imagePath) return "";

      if (imagePath.startsWith("http://") || imagePath.startsWith("https://")) {
        return imagePath;
      }

      try {
        const response = await fetch(CHARACTER_IMAGE_SIGN_URL_FUNCTION, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            path: imagePath,
          }),
        });

        const data = await response.json();

        if (!response.ok || data.error) {
          return "";
        }

        return data.signedUrl || "";
      } catch {
        return "";
      }
    }

    async function loadInitialData() {
      setStatus("データを読み込み中です...", "");

      try {
        const [personaResult, categoryResult, characterResult] = await Promise.all([
          supabaseClient
            .from("artist_prompt_personas")
            .select("*")
            .eq("is_active", true)
            .order("name", { ascending: true }),

          supabaseClient
            .from("character_categories")
            .select("*")
            .order("name", { ascending: true }),

          supabaseClient
            .from("character_profiles")
            .select("*")
            .order("name", { ascending: true }),
        ]);

        if (personaResult.error) throw personaResult.error;
        if (categoryResult.error) throw categoryResult.error;
        if (characterResult.error) throw characterResult.error;

        personas = personaResult.data || [];
        categories = categoryResult.data || [];
        characters = characterResult.data || [];

        renderPersonas();
        renderCategories();
        await renderCharacters();
        renderSelectedPersonaSummary();
        renderSelectedCharacterSummary();

        setStatus("データを読み込みました。", "success");
      } catch (error) {
        setStatus(`データ読み込みエラー：${error.message}`, "error");
      }
    }

    function renderPersonas() {
      personaGrid.innerHTML = "";

      if (personas.length === 0) {
        personaGrid.innerHTML = `<div class="hint">有効な絵師ペルソナがありません。</div>`;
        return;
      }

      personas.forEach((persona) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "persona-button";
        button.dataset.id = persona.id;

        if (selectedPersonas.some((item) => item.id === persona.id)) {
          button.classList.add("selected");
        }

        button.innerHTML = `
          <div>
            <strong>${escapeHtml(persona.name)}</strong>
            <div class="meta">${escapeHtml(getShortText(persona.system_instruction, 140))}</div>
          </div>
        `;

        button.addEventListener("click", () => {
          togglePersona(persona);
        });

        personaGrid.appendChild(button);
      });
    }

    function togglePersona(persona) {
      const exists = selectedPersonas.some((item) => item.id === persona.id);

      if (exists) {
        selectedPersonas = selectedPersonas.filter((item) => item.id !== persona.id);
      } else {
        if (selectedPersonas.length >= MAX_PERSONA_SELECTION) {
          setStatus("絵師ペルソナは最大2名まで選択できます。", "warning");
          return;
        }

        selectedPersonas.push(persona);
      }

      if (selectedPersonas.length < 2) {
        collabPattern.value = "auto";
        collabPattern.disabled = true;
      } else {
        collabPattern.disabled = false;
      }

      renderPersonas();
      renderSelectedPersonaSummary();
    }

    function removePersona(id) {
      selectedPersonas = selectedPersonas.filter((persona) => persona.id !== id);

      if (selectedPersonas.length < 2) {
        collabPattern.value = "auto";
        collabPattern.disabled = true;
      }

      renderPersonas();
      renderSelectedPersonaSummary();
    }

    function renderSelectedPersonaSummary() {
      selectedPersonaSummary.innerHTML = "";

      if (selectedPersonas.length === 0) {
        selectedPersonaSummary.innerHTML = `<span class="hint">絵師ペルソナ未選択</span>`;
        return;
      }

      selectedPersonas.forEach((persona, index) => {
        const chip = document.createElement("span");
        chip.className = "selected-chip";
        chip.innerHTML = `
          <span>${index === 0 ? "A" : "B"}：${escapeHtml(persona.name)}</span>
          <button type="button" aria-label="解除">×</button>
        `;

        chip.querySelector("button").addEventListener("click", () => {
          removePersona(persona.id);
        });

        selectedPersonaSummary.appendChild(chip);
      });
    }

    function renderCategories() {
      categorySelect.innerHTML = "";

      if (categories.length === 0) {
        const option = document.createElement("option");
        option.value = "";
        option.textContent = "カテゴリなし";
        categorySelect.appendChild(option);
        updateCategoryCount();
        return;
      }

      categories.forEach((category) => {
        const count = characters.filter((character) => character.category_id === category.id).length;
        const option = document.createElement("option");
        option.value = category.id;
        option.textContent = `${category.name}（${count}件）`;
        categorySelect.appendChild(option);
      });

      updateCategoryCount();
    }

    function updateCategoryCount() {
      const currentCategoryId = categorySelect.value;

      const count = characters.filter((character) => {
        return character.category_id === currentCategoryId;
      }).length;

      categoryCountBadge.textContent = `${count}件`;
    }

    async function renderCharacters() {
      characterGrid.innerHTML = "";
      updateCategoryCount();

      const currentCategoryId = categorySelect.value;

      const filteredCharacters = characters.filter((character) => {
        return character.category_id === currentCategoryId;
      });

      if (filteredCharacters.length === 0) {
        characterGrid.innerHTML = `<div class="hint">このカテゴリにはキャラクターがありません。</div>`;
        return;
      }

      for (const character of filteredCharacters) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "character-button";
        button.dataset.id = character.id;

        if (selectedCharacters.some((item) => item.id === character.id)) {
          button.classList.add("selected");
        }

        const signedUrl = await getSignedImageUrl(character.image_url);

        button.innerHTML = `
          ${
            signedUrl
              ? `<img class="character-thumb" src="${escapeHtml(signedUrl)}" alt="${escapeHtml(character.name)}">`
              : `<div class="character-placeholder">No Image</div>`
          }
          <div>
            <strong>${escapeHtml(character.name)}</strong>
            <div class="meta">${escapeHtml(getShortText(character.base_prompt, 120))}</div>
          </div>
        `;

        button.addEventListener("click", () => {
          toggleCharacter(character);
        });

        characterGrid.appendChild(button);
      }
    }

    function toggleCharacter(character) {
      const exists = selectedCharacters.some((item) => item.id === character.id);

      if (exists) {
        selectedCharacters = selectedCharacters.filter((item) => item.id !== character.id);
      } else {
        selectedCharacters.push(character);
      }

      renderCharacters();
      renderSelectedCharacterSummary();
    }

    function removeCharacter(id) {
      selectedCharacters = selectedCharacters.filter((character) => character.id !== id);
      renderCharacters();
      renderSelectedCharacterSummary();
    }

    function clearSelectedCharacters() {
      selectedCharacters = [];
      renderCharacters();
      renderSelectedCharacterSummary();
      setStatus("選択中キャラクターを全解除しました。", "success");
    }

    function renderSelectedCharacterSummary() {
      selectedCharacterSummary.innerHTML = "";

      if (selectedCharacters.length === 0) {
        selectedCharacterSummary.innerHTML = `<span class="hint">キャラクター未選択</span>`;
        return;
      }

      selectedCharacters.forEach((character) => {
        const chip = document.createElement("span");
        chip.className = "selected-chip";
        chip.innerHTML = `
          <span>${escapeHtml(character.name)}</span>
          <button type="button" aria-label="解除">×</button>
        `;

        chip.querySelector("button").addEventListener("click", () => {
          removeCharacter(character.id);
        });

        selectedCharacterSummary.appendChild(chip);
      });
    }

    function buildCollabPatternBlock() {
      if (selectedPersonas.length === 0) {
        return "絵師ペルソナは未選択です。一般的で高品質な画像生成プロンプトとして作成してください。";
      }

      if (selectedPersonas.length === 1) {
        const persona = selectedPersonas[0];

        return `
選択された絵師ペルソナ：
- ${persona.name}

この絵師ペルソナの system_instruction を最優先で反映してください。
`.trim();
      }

      const personaA = selectedPersonas[0];
      const personaB = selectedPersonas[1];
      const pattern = collabPattern.value || "auto";

      return `
選択された絵師ペルソナ：
- A：${personaA.name}
- B：${personaB.name}

共創パターン：
${COLLAB_PATTERN_LABELS[pattern] || COLLAB_PATTERN_LABELS.auto}

解釈ルール：
- AとBの画風・構図・演出を破綻なく統合してください。
- 共創パターンに応じて、AとBの担当領域を明確に分担してください。
- どちらか一方の個性だけに偏らず、両方の特徴が自然に反映されるようにしてください。
`.trim();
    }

    function buildNoneOptionsBlock() {
      const checkedValues = Array.from(document.querySelectorAll(".none-option:checked"))
        .map((input) => input.value)
        .filter(Boolean);

      if (checkedValues.length === 0) {
        return "";
      }

      const lines = checkedValues.map((value) => `- ${NONE_OPTION_LABELS[value] || value}`);

      return `
無し設定：
${lines.join("\n")}

上記の無し設定は必ず守ってください。
`.trim();
    }

    function buildCharacterPromptBlock() {
      if (selectedCharacters.length === 0) {
        return "選択キャラクターはありません。";
      }

      const lines = selectedCharacters.map((character, index) => {
        return `
${index + 1}. ${character.name}

キャラクター基本設定：
${character.base_prompt || "未設定"}

キャラクター画像パス：
${character.image_url || "未設定"}
`.trim();
      });

      return `
選択キャラクター一覧：
${lines.join("\n\n")}
`.trim();
    }

    function buildCombinedSystemInstruction() {
      const personaInstructions = selectedPersonas.map((persona, index) => {
        return `
【絵師${index === 0 ? "A" : "B"}：${persona.name}】
${persona.system_instruction || ""}
`.trim();
      });

      return `
あなたは画像生成プロンプト作成の専門家です。
ユーザーの日本語指示をもとに、画像生成AI向けの高品質なプロンプトを作成してください。

重要：
- 出力は必ず「## English Prompt」と「## 日本語プロンプト」の2見出しだけにしてください。
- メモ、解説、補足、Markdown表、コードブロックは出力しないでください。
- English Prompt は画像生成AIへそのまま入力できる自然な英語にしてください。
- 日本語プロンプトは、English Promptの内容を確認しやすい日本語にしてください。
- キャラクター名は、登録されている名称を尊重してください。
- キャラクターのbase_promptがある場合は、外見・服装・役割・世界観を優先して反映してください。
- 文字なし等の無し設定がある場合は必ず守ってください。

${personaInstructions.join("\n\n")}

${buildCollabPatternBlock()}

${buildNoneOptionsBlock()}
`.trim();
    }

    function splitGeneratedText(text) {
      const englishMatch = text.match(/## English Prompt\s*([\s\S]*?)(?=## 日本語プロンプト|$)/);
      const japaneseMatch = text.match(/## 日本語プロンプト\s*([\s\S]*?)$/);

      return {
        english: englishMatch ? englishMatch[1].trim() : "",
        japanese: japaneseMatch ? japaneseMatch[1].trim() : "",
      };
    }

    async function generatePrompt() {
      const scene = sceneText.value.trim();
      const extra = extraText.value.trim();

      if (!scene) {
        setStatus("作りたい画像の内容を入力してください。", "error");
        return;
      }

      generateBtn.disabled = true;
      setStatus("プロンプトを生成しています...", "");

      englishPrompt.textContent = "";
      japanesePrompt.textContent = "";

      try {
        const combinedSystemInstruction = buildCombinedSystemInstruction();

        const characterPrompt = `
ユーザーの作りたい画像：
${scene}

追加条件：
${extra || "なし"}

${buildCharacterPromptBlock()}
`.trim();

        const response = await fetch(FUNCTION_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            systemInstruction: combinedSystemInstruction,
            characterPrompt,
            modelName: modelName.value,
          }),
        });

        const data = await response.json();

        if (!response.ok || data.error) {
          throw new Error(data.error || "プロンプト生成に失敗しました。");
        }

        const rawText = data.text || data.result || "";
        const split = splitGeneratedText(rawText);

        englishPrompt.textContent = split.english || rawText;
        japanesePrompt.textContent = split.japanese || "";

        setStatus("プロンプトを生成しました。", "success");
      } catch (error) {
        setStatus(`生成エラー：${error.message}`, "error");
      } finally {
        generateBtn.disabled = false;
      }
    }

    async function copyText(text, label) {
      if (!text) {
        setStatus(`${label}が空です。`, "warning");
        return;
      }

      try {
        await navigator.clipboard.writeText(text);
        setStatus(`${label}をコピーしました。`, "success");
      } catch {
        setStatus(`${label}のコピーに失敗しました。`, "error");
      }
    }

    function clearInputs() {
      sceneText.value = "";
      extraText.value = "";
      englishPrompt.textContent = "";
      japanesePrompt.textContent = "";
      setStatus("入力と生成結果をクリアしました。", "success");
    }

    categorySelect.addEventListener("change", async () => {
      updateCategoryCount();
      await renderCharacters();
    });

    clearCharactersBtn.addEventListener("click", clearSelectedCharacters);

    generateBtn.addEventListener("click", generatePrompt);

    clearInputBtn.addEventListener("click", clearInputs);

    copyEnglishBtn.addEventListener("click", () => {
      copyText(englishPrompt.textContent, "English Prompt");
    });

    copyJapaneseBtn.addEventListener("click", () => {
      copyText(japanesePrompt.textContent, "日本語プロンプト");
    });

    loadInitialData();
  </script>
</body>
</html>
